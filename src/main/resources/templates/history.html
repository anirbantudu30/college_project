<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 antialiased">

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-clock-history text-indigo-600"></i>
                    Prediction History
                </h1>
                <p class="text-sm text-slate-500 mt-1">Review your past cost estimations and system configurations.</p>
            </div>
            
            <a th:href="@{/dashboard}" 
               class="inline-flex items-center gap-2 bg-white border border-slate-300 hover:border-slate-400 text-slate-700 font-medium px-4 py-2.5 rounded-xl shadow-sm transition-all duration-200 hover:bg-slate-50 active:scale-98">
                <i class="fa-solid fa-arrow-left text-xs"></i>
                Back to Dashboard
            </a>
        </div>

        <div th:if="${#lists.isEmpty(pastPredictions)}" 
             class="bg-white rounded-2xl border border-slate-200 p-12 text-center shadow-sm max-w-md mx-auto mt-12">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-folder-open"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-900">No predictions found</h3>
            <p class="text-slate-500 text-sm mt-1 mb-6">You haven't run any structural or cost calculations yet.</p>
            <a th:href="@{/dashboard}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-xl shadow-sm transition-colors">
                Start First Prediction
            </a>
        </div>

        <div th:unless="${#lists.isEmpty(pastPredictions)}">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-lg font-bold">
                        <i class="fa-solid fa-calculator"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Total Runs</p>
                        <p class="text-xl font-bold text-slate-800" th:text="${pastPredictions.size()}">0</p>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div th:each="prediction : ${pastPredictions}" 
                     class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-md transition-all duration-200 flex flex-col md:flex-row md:items-start justify-between gap-6 relative overflow-hidden group">
                    
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-600 transform scale-y-0 group-hover:scale-y-100 transition-transform duration-200"></div>

                    <div class="flex-1 space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-md">
                                ID: #<span th:text="${prediction.id}">1</span>
                            </span>
                        </div>
                        
                        <div>
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Generated Advice</h4>
                            <p class="text-slate-700 leading-relaxed font-medium" th:text="${prediction.advice}">
                                Advice snippet goes here...
                            </p>
                        </div>
                    </div>

                    <div class="md:text-right border-t md:border-t-0 border-slate-100 pt-4 md:pt-0 flex flex-row md:flex-col justify-between items-center md:items-end gap-2 min-w-[180px]">
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Estimated Cost</p>
                            <p class="text-2xl font-black text-indigo-600 mt-0.5">
                                ₹<span th:text="${#numbers.formatDecimal(prediction.estimatedCost, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                            </p>
                        </div>
                    </div>
                    
                </div>
            </div>
            
        </div>

    </div>
</body>
</html>
